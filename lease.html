<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Zone Land Lease Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="navbar">
        <div class="logo-area">
            <h2>AGRI ZONE</h2>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="lease.html">Land Lease</a></li>
                
            </ul>
        </nav>
    </div>
</header>

<section class="lease-hero">
    <h1>🌱 Agricultural Land Lease Exchange</h1>
    <p>List Your Farmland for Seasonal Lease & Connect with Interested Farmers</p>
</section>

<section class="lease-form-section">
    <div class="lease-box">
        <h2>Submit Land for Lease</h2>

        <input type="text" id="ownerName" placeholder="Land Owner Name">
        <input type="text" id="ownerMobile" placeholder="Mobile Number">
        <input type="text" id="village" placeholder="Village / District">
        <input type="number" id="acres" placeholder="Total Acres">

        <select id="soilType">
            <option>Select Soil Type</option>
            <option>Loamy Soil</option>
            <option>Clay Soil</option>
            <option>Sandy Soil</option>
            <option>Black Soil</option>
            <option>Red Soil</option>
        </select>

        <select id="waterFacility">
            <option>Irrigation Availability</option>
            <option>Tubewell Available</option>
            <option>Canal Water</option>
            <option>Rainfed Only</option>
        </select>

        <input type="text" id="leaseDuration" placeholder="Lease Duration (e.g. 1 Year)">
        <input type="text" id="leasePrice" placeholder="Expected Lease Amount">

        <textarea id="notes" placeholder="Additional Notes"></textarea>

        <button onclick="submitLease()">List My Land</button>

        <div id="leaseMsg"></div>
    </div>
</section>

<section class="lease-display">
    <h2>📍 Available Lease Listings</h2>
    <div id="leaseListings"></div>
</section>
<a href="i.html" class="simple-back-btn">⬅ Back to Home</a>
<script src="lease.js"></script>
</body>
</html>
