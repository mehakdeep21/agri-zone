<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Zone Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="login-page">
    <div class="login-box">
        <h2>Create Agri Zone Account</h2>

        <input type="text" id="fullName" placeholder="Full Name">
        <input type="text" id="newusername" placeholder="Create Username">
        <input type="password" id="newpassword" placeholder="Create Password">
        <input type="text" id="mobile" placeholder="Mobile Number">
        <input type="text" id="village" placeholder="Village / District">
        <input type="text" id="state" placeholder="State">

        

        <button onclick="signupUser()">Create Account</button>

        <div id="signupMsg"></div>
    </div>
</section>

<a href="login.html" class="simple-back-btn">⬅ Back to Login</a>

<script src="signup.js"></script>
</body>
</html>
